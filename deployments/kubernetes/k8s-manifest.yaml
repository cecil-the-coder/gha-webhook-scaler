---
apiVersion: v1
kind: Namespace
metadata:
  name: github-runners
  labels:
    name: github-runners

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-runner-config
  namespace: github-runners
data:
  # Repository configuration
  REPO_OWNER: "your-github-org"  # Set your GitHub organization/user
  ALL_REPOS: "true"
  
  # Runner configuration
  MAX_RUNNERS: "5"
  RUNNER_TIMEOUT: "3600"
  RUNNER_IMAGE: "myoung34/github-runner:ubuntu-noble"
  CACHE_VOLUMES: "true"
  LABELS: "self-hosted,linux,arm64"
  
  # Server configuration
  PORT: "8080"
  DEBUG: "false"
  
  # Runtime configuration
  RUNTIME: "kubernetes"
  
  # Webhook configuration
  WEBHOOK_URL: "https://your-webhook-domain.com/webhook"  # Set your external webhook URL
  # WEBHOOK_SECRET is configured via Secret below
  
  # Job scanning configuration (300 seconds = 5 minutes)
  JOB_SCAN_INTERVAL_SECONDS: "300"

---
apiVersion: v1
kind: Secret
metadata:
  name: github-runner-secrets
  namespace: github-runners
type: Opaque
data:
  # Base64 encoded values - replace with your actual encoded secrets
  # To encode: echo -n "your-token" | base64
  GITHUB_TOKEN: "your-base64-encoded-token"        # Required: Your GitHub token (base64 encoded)
  WEBHOOK_SECRET: "your-base64-encoded-secret"      # Optional: Webhook secret (base64 encoded)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner-autoscaler
  namespace: github-runners
  labels:
    app: github-runner-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-runner-autoscaler
  template:
    metadata:
      labels:
        app: github-runner-autoscaler
    spec:
      serviceAccountName: github-runner-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: autoscaler
        image: ghcr.io/cecil-the-coder/gha-webhook-scaler:latest  # Replace with your actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: REPO_OWNER
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: REPO_OWNER
        - name: REPO_NAME
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: REPO_NAME
        - name: ALL_REPOS
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: ALL_REPOS
        - name: MAX_RUNNERS
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: MAX_RUNNERS
        - name: RUNNER_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: RUNNER_TIMEOUT
        - name: RUNNER_IMAGE
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: RUNNER_IMAGE
        - name: CACHE_VOLUMES
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: CACHE_VOLUMES
        - name: LABELS
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: LABELS
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: PORT
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: DEBUG
        # Runtime configuration
        - name: RUNTIME
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: RUNTIME
        # Webhook configuration
        - name: WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: WEBHOOK_URL
        # WEBHOOK_SECRET is loaded from Secret below, not ConfigMap
        # Job scanning configuration
        - name: JOB_SCAN_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: github-runner-config
              key: JOB_SCAN_INTERVAL_SECONDS
        # Secrets
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-runner-secrets
              key: GITHUB_TOKEN
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: github-runner-secrets
              key: WEBHOOK_SECRET
              optional: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: logs
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner-sa
  namespace: github-runners

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-runner-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-runner-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-runner-role
subjects:
- kind: ServiceAccount
  name: github-runner-sa
  namespace: github-runners

---
apiVersion: v1
kind: Service
metadata:
  name: github-runner-service
  namespace: github-runners
  labels:
    app: github-runner-autoscaler
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: github-runner-autoscaler

---
# Optional: ServiceMonitor for Prometheus monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: github-runner-monitor
  namespace: github-runners
  labels:
    app: github-runner-autoscaler
spec:
  selector:
    matchLabels:
      app: github-runner-autoscaler
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-runner-ingress
  namespace: github-runners
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Add TLS and other annotations as needed
spec:
  ingressClassName: nginx
  rules:
  - host: your-domain.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: github-runner-service
            port:
              number: 8080
  Uncomment and configure TLS if needed
  tls:
  - hosts:
    - your-domain.com
    secretName: github-runner-tls

---
# Optional: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: github-runner-hpa
  namespace: github-runners
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: github-runner-autoscaler
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80 
